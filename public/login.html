<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#07080c">
  <title>StakeBet — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#06070b; --s2:#12141c; --s3:#191c26; --border2:rgba(255,255,255,0.13); --text:#eef0f5; --text2:#838a9e; --emerald:#22e88a; --indigo:#6366f1; --indigo2:#818cf8; --red:#f87171; }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:28px 28px;}
    .card{background:var(--s2);border:1px solid var(--border2);border-radius:18px;padding:40px 32px;width:100%;max-width:400px;box-shadow:0 12px 40px rgba(0,0,0,0.4);}
    h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:800;text-align:center;margin-bottom:8px;}
    h1 span{color:#fbbf24;}
    .sub{text-align:center;color:var(--text2);font-size:13px;margin-bottom:32px;}
    .field{margin-bottom:18px;}
    .field label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
    .field input{width:100%;padding:13px 15px;font-size:14px;font-family:'Inter',sans-serif;border:1px solid var(--border2);border-radius:10px;background:var(--s3);color:var(--text);outline:none;}
    .field input:focus{border-color:var(--indigo2);}
    .btn{width:100%;padding:14px;font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--indigo),#4f46e5);color:#fff;border:none;border-radius:12px;cursor:pointer;margin-top:8px;}
    .btn:active{opacity:.85;}
    .btn.ghost{background:var(--s3);color:var(--text2);border:1px solid var(--border2);margin-top:12px;}
    .error{color:var(--red);font-size:12px;text-align:center;margin-top:12px;display:none;}
    .toggle{text-align:center;margin-top:20px;font-size:12px;color:var(--text2);}
    .toggle a{color:var(--indigo2);cursor:pointer;text-decoration:none;font-weight:600;}
    .toggle a:hover{text-decoration:underline;}
    .badge{display:inline-flex;align-items:center;gap:4px;background:rgba(34,232,138,0.1);color:var(--emerald);border:1px solid rgba(34,232,138,0.28);border-radius:99px;padding:3px 10px;font-size:10px;font-weight:700;margin-bottom:24px;}
  </style>
</head>
<body>
<div class="card">
  <div style="text-align:center;margin-bottom:4px;">
    <span class="badge">🏦 Controle profissional</span>
  </div>
  <h1>Stake<span>Bet</span></h1>
  <div class="sub" id="form-title">Faça login para continuar</div>

  <div class="field"><label>Email</label><input type="email" id="email" placeholder="seu@email.com" autocomplete="email"></div>
  <div class="field"><label>Senha</label><input type="password" id="password" placeholder="Sua senha" autocomplete="current-password"></div>
  <div class="error" id="error"></div>
  <button class="btn" id="submit-btn" onclick="handleSubmit()">Entrar</button>

  <div class="toggle">
    <span id="toggle-text">Não tem conta?</span>
    <a id="toggle-link" onclick="toggleMode()">Criar conta</a>
  </div>
  <div style="text-align:center;margin-top:24px;font-size:10px;color:var(--text2);">
    Seus dados ficam salvos na sua conta.<br>PC e celular sincronizados em tempo real.
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // Config — substitua pelas suas credenciais
  var SUPABASE_URL = '';
  var SUPABASE_KEY = '';
  var client = null;
  var mode = 'login'; // 'login' | 'signup'

  if (SUPABASE_URL) {
    client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }

  function toggleMode() {
    mode = mode === 'login' ? 'signup' : 'login';
    document.getElementById('form-title').textContent = mode === 'login' ? 'Faça login para continuar' : 'Crie sua conta gratuita';
    document.getElementById('submit-btn').textContent = mode === 'login' ? 'Entrar' : 'Criar conta';
    document.getElementById('toggle-text').textContent = mode === 'login' ? 'Não tem conta?' : 'Já tem conta?';
    document.getElementById('toggle-link').textContent = mode === 'login' ? 'Criar conta' : 'Fazer login';
    document.getElementById('error').style.display = 'none';
  }

  async function handleSubmit() {
    var email = document.getElementById('email').value.trim();
    var password = document.getElementById('password').value;
    var errorEl = document.getElementById('error');

    if (!email || !password) { errorEl.textContent = 'Preencha email e senha.'; errorEl.style.display = 'block'; return; }
    if (!client) { errorEl.textContent = 'Supabase não configurado. Configure SUPABASE_URL e SUPABASE_KEY.'; errorEl.style.display = 'block'; return; }

    errorEl.style.display = 'none';
    var result;
    if (mode === 'signup') {
      result = await client.auth.signUp({ email: email, password: password });
      if (result.error) { errorEl.textContent = result.error.message; errorEl.style.display = 'block'; return; }
      errorEl.style.color = 'var(--emerald)';
      errorEl.textContent = 'Conta criada! Verifique seu email e faça login.';
      errorEl.style.display = 'block';
      toggleMode();
    } else {
      result = await client.auth.signInWithPassword({ email: email, password: password });
      if (result.error) { errorEl.textContent = result.error.message; errorEl.style.display = 'block'; return; }
      window.location.href = '/index.html';
    }
  }

  document.getElementById('password').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') handleSubmit();
  });

  // Se já estiver logado, redireciona
  if (client) {
    client.auth.getSession().then(function(res) {
      if (res.data.session) window.location.href = '/index.html';
    });
  }
</script>
</body>
</html>
